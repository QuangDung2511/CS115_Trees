[theme]
base = "light"
primaryColor = "#00838F"        
backgroundColor = "#FFFFFF"     
secondaryBackgroundColor = "#F0F2F6" 
textColor = "#262730"           
font = "sans serif"

[server]
headless = true
runOnSave = true
enableCORS = false
enableXsrfProtection = false
fileWatcherType = "none"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
