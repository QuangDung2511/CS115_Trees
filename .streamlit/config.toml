[theme]
# Theme "Morning Freshness" - Sáng, sạch và chuyên nghiệp
base = "light"
primaryColor = "#00838F"        # Màu xanh Teal đậm hơn để dễ đọc trên nền trắng
backgroundColor = "#FFFFFF"     # Nền trắng tinh
secondaryBackgroundColor = "#F0F2F6" # Sidebar màu xám rất nhạt (chuẩn style hiện đại)
textColor = "#262730"           # Màu chữ xám đen (đỡ mỏi mắt hơn đen tuyền)
font = "sans serif"

# --- GIỮ NGUYÊN CÁC CẤU HÌNH NÂNG CAO CŨ CỦA BẠN ---
[server]
headless = true
runOnSave = true
enableCORS = false
enableXsrfProtection = false
fileWatcherType = "none"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
